<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Trunfo: Dinossauros</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="setup-screen" class="screen active">
        <div class="modal">
            <h1>Super Trunfo Dinos</h1>
            <div class="input-group">
                <input type="text" id="player1-name" placeholder="Nome do Jogador 1" required>
            </div>
            <div class="input-group">
                <input type="text" id="player2-name" placeholder="Nome do Jogador 2" required>
            </div>
            <div class="input-group">
                <label for="card-count">Total de cartas no jogo (par):</label>
                <input type="number" id="card-count" value="10" min="2" step="2" required>
            </div>
            <div class="input-group">
                <label for="game-mode">Modo de Jogo:</label>
                <select id="game-mode">
                    <option value="random">Dinossauros Aleatórios</option>
                    <option value="famosos">Os Mais Famosos</option>
                </select>
            </div>
            <button id="btn-start">Começar Jogo</button>
            <p id="setup-error" class="error-msg"></p>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <header>
            <h2 id="turn-indicator">Vez do Jogador 1</h2>
            <p id="game-status">Escolha um atributo para desafiar!</p>
            <p id="pool-status" class="hidden">Cartas na mesa (Empate): <span id="pool-count">0</span></p>
        </header>

        <div class="board">
            <div class="player-area" id="area-p1">
                <h3 id="name-p1">Jogador 1 <span class="crown">👑</span></h3>
                <div class="deck-info">Cartas restantes: <span id="count-p1">0</span></div>
                <div class="card-slot" id="card-p1"></div>
            </div>

            <div class="center-arena">
                <div id="vs-badge">VS</div>
                <div class="action-area">
                    <button id="btn-next-turn" class="fade-btn">Próxima Rodada</button>
                </div>
            </div>

            <div class="player-area" id="area-p2">
                <h3 id="name-p2"><span class="crown">👑</span> Jogador 2</h3>
                <div class="deck-info">Cartas restantes: <span id="count-p2">0</span></div>
                <div class="card-slot" id="card-p2"></div>
            </div>
        </div>
    </div>

    <div id="win-screen" class="screen">
        <div class="modal">
            <h1>Fim de Jogo!</h1>
            <h2 id="winner-name">Jogador X Venceu!</h2>
            <button onclick="location.reload()">Jogar Novamente</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
