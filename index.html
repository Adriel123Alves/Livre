<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trunfo Dino - Gerenciador</title>
    <style>
        /* Estilização padrão para o select dentro do input-field */
        .input-field select {
            width: 100%;
            padding: 10px 12px;
            margin-top: 5px;
            border: 1px solid #cccccc63; /* Ajuste para a cor da borda dos seus inputs */
            border-radius: 6px; /* Ajuste para o arredondamento dos seus inputs */
            font-size: 16px;
            font-family: inherit;
            color: #333;
            background-color: #ffffff13;
            box-sizing: border-box;
            cursor: pointer;
            
            /* Remove a setinha padrão feia do navegador */
            appearance: none; 
            -webkit-appearance: none;
            -moz-appearance: none;
            
            /* Adiciona uma setinha customizada mais bonita */
            background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23333' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
        }

        /* Estilo quando o select é clicado/focado */
        .input-field select:focus {
            outline: none;
            border-color: #007BFF; /* Mude para a cor principal do seu projeto */
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.3); /* Mude para a cor principal do seu projeto */
        }

        /* Deixa o texto do placeholder (primeira opção) com cor mais clara */
        .input-field select:invalid, 
        .input-field select option[value=""] {
            color: #88888865;
        }

        /* Garante que as opções normais fiquem escuras */
        .input-field select option {
            color: #333;
        }        
        :root {
            --bg-color: #0f172a;      /* Fundo principal escuro */
            --card-bg: #1e293b;       /* Fundo dos cards e modal */
            --text-main: #f8fafc;     /* Texto claro */
            --text-muted: #94a3b8;    /* Texto secundário */
            --accent: #10b981;        /* Verde Esmeralda moderno */
            --accent-hover: #059669;
            --magic-bg: #064e3b;      /* Fundo do número mágico */
            --magic-text: #34d399;    /* Texto do número mágico */
            --danger: #7f1d1d;
            --danger-text: #fca5a5;
            --danger-hover: #991b1b;
            --input-bg: #0f172a;      /* Fundo dos inputs */
            --border-color: #334155;
            --border-radius: 16px;
            --transition: all 0.3s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 30px 20px;
        }

        /* === CABEÇALHO === */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1300px;
            margin: 0 auto 40px auto;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        header h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1px;
        }

        header h1 span {
            color: var(--accent);
        }

        .btn-add-new {
            background-color: var(--accent);
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            transition: var(--transition);
            box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2);
        }

        .btn-add-new:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
        }

        /* === LISTA DE DINOS (Cards) === */
        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        .list-section {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .dino-card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
        }

        .dino-card:hover {
            transform: translateY(-6px);
            border-color: var(--accent);
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.15);
        }

        .dino-img {
            width: 100%;
            height: 190px;
            background-color: var(--bg-color);
            background-size: cover;
            background-position: center;
            border-bottom: 1px solid var(--border-color);
        }

        .dino-info {
            padding: 20px;
            flex-grow: 1;
        }

        .dino-info h3 {
            margin-bottom: 15px;
            font-size: 1.3rem;
            font-weight: 700;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 0.8rem;
        }

        .stats span {
            background: rgba(0,0,0,0.2);
            color: var(--text-muted);
            padding: 6px 10px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stats strong {
            color: var(--text-main);
            font-weight: 600;
        }

        .stats span.magic-stat {
            grid-column: 1 / -1;
            background-color: var(--magic-bg);
            color: var(--magic-text);
            font-weight: bold;
            justify-content: center;
            gap: 8px;
            font-size: 0.9rem;
            padding: 10px;
        }

        .stats span.magic-stat strong {
            color: #fff;
        }

        .card-actions {
            display: flex;
            gap: 10px;
            padding: 0 20px 20px 20px;
        }

        .btn-action {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: var(--transition);
        }

        .btn-edit { background-color: var(--bg-color); color: var(--text-main); border: 1px solid var(--border-color); }
        .btn-edit:hover { border-color: var(--text-main); }
        .btn-delete { background-color: var(--danger); color: var(--danger-text); }
        .btn-delete:hover { background-color: var(--danger-hover); color: #fff; }

        .empty-msg {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            font-size: 1.1rem;
            background: var(--card-bg);
            border-radius: var(--border-radius);
            border: 1px dashed var(--border-color);
        }

        /* === MODAL (Formulário Escondido) === */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: var(--border-radius);
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(20px);
            transition: transform 0.3s ease;
            border: 1px solid var(--border-color);
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .modal-header h2 { font-size: 1.4rem; color: var(--text-main); }
        
        .btn-close {
            background: none; border: none;
            color: var(--text-muted);
            font-size: 1.5rem; cursor: pointer;
            transition: color 0.2s;
        }
        .btn-close:hover { color: #fff; }

        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .input-group.full { grid-template-columns: 1fr; }
        .input-field { display: flex; flex-direction: column; }
        .input-field label { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 6px; }
        
        .input-field input {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px;
            border-radius: 8px;
            outline: none;
            transition: border 0.3s;
        }
        .input-field input:focus { border-color: var(--accent); }

        .btn-submit {
            background-color: var(--accent);
            color: #fff; font-weight: 600; border: none;
            padding: 14px; width: 100%; border-radius: 8px;
            cursor: pointer; margin-top: 10px; font-size: 1rem;
            transition: background 0.3s;
        }
        .btn-submit:hover { background-color: var(--accent-hover); }

        /* Scrollbar customizada para o modal */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    </style>
</head>
<body>

    <header>
        <h1>🦖 Trunfo <span>Dino</span></h1>
        <button class="btn-add-new" id="btn-open-modal">+ Novo Dinossauro</button>
    </header>

    <div class="container">
        <div class="list-section" id="dino-list"></div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="form-title">Adicionar Dinossauro</h2>
                <button class="btn-close" id="btn-close-modal">&times;</button>
            </div>
            
            <form id="dino-form">
                <input type="hidden" id="dino-id">
                
                <div class="input-group full">
                    <div class="input-field">
                        <label>Nome do Dinossauro</label>
                        <input type="text" id="nome" required placeholder="Ex: Tiranossauro Rex">
                    </div>
                </div>

                <div class="input-group">
                    <div class="input-field">
                        <label>Altura (m)</label>
                        <input type="number" step="0.1" id="altura" required>
                    </div>
                    <div class="input-field">
                        <label>Comprimento (m)</label>
                        <input type="number" step="0.1" id="comprimento" required>
                    </div>
                    <div class="input-field">
                        <label>Peso (kg)</label>
                        <input type="number" step="0.1" id="peso" required>
                    </div>
                    <div class="input-field">
                        <label>Velocidade</label>
                        <input type="number" id="velocidade" required>
                    </div>
                    <div class="input-field">
                        <label>Agilidade</label>
                        <input type="number" id="agilidade" required>
                    </div>
                    <div class="input-field">
                        <label>Longevidade (anos)</label>
                        <input type="number" id="longevidade" required>
                    </div>
                </div>

                <div class="input-group full">
                    <div class="input-field">
                        <label>Fama</label>
                        <input type="number" id="fama" required placeholder="Ex: 10">
                    </div>
                    <div class="input-field">
                        <label>Tipo</label>
                        <select id="tipo" required>
                            <option value="" disabled selected>Selecione o tipo...</option>
                            <option value="Carnívoro">Carnívoro</option>
                            <option value="Herbívoro">Herbívoro</option>
                            <option value="Onívoro">Onívoro</option>
                            <option value="Piscívoro">Piscívoro</option>
                        </select>
                    </div>
                </div>

                <div class="input-group full">
                    <div class="input-field">
                        <label>Número Mágico</label>
                        <input type="number" id="numero_magico" required>
                    </div>
                    <div class="input-field">
                        <label>URL da Imagem</label>
                        <input type="url" id="imagem" placeholder="https://link-da-imagem.com/foto.jpg">
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="btn-submit">Salvar Dinossauro</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000';
        const dinoForm = document.getElementById('dino-form');
        const dinoList = document.getElementById('dino-list');
        const formTitle = document.getElementById('form-title');
        const btnSubmit = document.getElementById('btn-submit');
        
        // Controle do Modal
        const modal = document.getElementById('modal');
        const btnOpenModal = document.getElementById('btn-open-modal');
        const btnCloseModal = document.getElementById('btn-close-modal');

        function openModal() {
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
            resetForm();
        }

        btnOpenModal.addEventListener('click', openModal);
        btnCloseModal.addEventListener('click', closeModal);
        
        // Fechar modal clicando fora dele
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        // Carregar Dinos ao iniciar
        document.addEventListener('DOMContentLoaded', fetchDinos);

        // Buscar todos os Dinos
        async function fetchDinos() {
            try {
                const response = await fetch(`${API_URL}/dinos`);
                const dinos = await response.json();
                renderDinos(dinos);
            } catch (error) {
                console.error("Erro ao buscar dinos:", error);
                dinoList.innerHTML = `<div class="empty-msg">⚠️ Erro ao conectar com o servidor. Verifique se a API está rodando.</div>`;
            }
        }

        // Renderizar Cards na Tela
        function renderDinos(dinos) {
            dinoList.innerHTML = '';
            
            if (dinos.length === 0) {
                dinoList.innerHTML = '<div class="empty-msg">Nenhum dinossauro encontrado. Clique em "+ Novo Dinossauro" para começar!</div>';
                return;
            }

            dinos.forEach(dino => {
                const id = dino.id_dino || dino.ID_DINO;
                const imagem = dino.imagem || dino.IMAGEM || 'https://via.placeholder.com/300x180/0f172a/94a3b8?text=Sem+Foto';
                
                const card = document.createElement('div');
                card.className = 'dino-card';
                card.innerHTML = `
                    <div class="dino-img" style="background-image: url('${imagem}')"></div>
                    <div class="dino-info">
                        <h3>${dino.nome || dino.NOME}</h3>
                        <div class="stats">
                            <span>Alt: <strong>${dino.altura || dino.ALTURA}m</strong></span>
                            <span>Comp: <strong>${dino.comprimento || dino.COMPRIMENTO}m</strong></span>
                            <span>Peso: <strong>${dino.peso || dino.PESO}kg</strong></span>
                            <span>Veloc: <strong>${dino.velocidade || dino.VELOCIDADE}</strong></span>
                            <span>Agil: <strong>${dino.agilidade || dino.AGILIDADE}</strong></span>
                            <span>Long: <strong>${dino.longevidade || dino.LONGEVIDADE}a</strong></span>
                            <span class="magic-stat">
                                Magia: <strong>${dino.numero_magico || dino.NUMERO_MAGICO}</strong>
                            </span>
                        </div>
                    </div>
                    <div class="card-actions">
                        <button class="btn-action btn-edit" onclick='editDino(${JSON.stringify(dino).replace(/'/g, "&#39;")})'>Editar</button>
                        <button class="btn-action btn-delete" onclick="deleteDino(${id})">Excluir</button>
                    </div>
                `;
                dinoList.appendChild(card);
            });
        }

        // Adicionar ou Atualizar Dino
        dinoForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const dinoId = document.getElementById('dino-id').value;
            const payload = {
                nome: document.getElementById('nome').value,
                altura: parseFloat(document.getElementById('altura').value),
                comprimento: parseFloat(document.getElementById('comprimento').value),
                peso: parseFloat(document.getElementById('peso').value),
                velocidade: parseInt(document.getElementById('velocidade').value),
                agilidade: parseInt(document.getElementById('agilidade').value),
                longevidade: parseInt(document.getElementById('longevidade').value),
                numero_magico: parseInt(document.getElementById('numero_magico').value),
                imagem: document.getElementById('imagem').value
            };

            try {
                if (dinoId) {
                    await fetch(`${API_URL}/att/${dinoId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                } else {
                    await fetch(`${API_URL}/add`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                }
                
                closeModal();
                fetchDinos();
            } catch (error) {
                console.error("Erro ao salvar dino:", error);
                alert("Erro ao salvar o dinossauro. Verifique o console.");
            }
        });

        // Preparar formulário para edição
        function editDino(dino) {
            document.getElementById('dino-id').value = dino.id_dino || dino.ID_DINO;
            document.getElementById('nome').value = dino.nome || dino.NOME;
            document.getElementById('altura').value = dino.altura || dino.ALTURA;
            document.getElementById('comprimento').value = dino.comprimento || dino.COMPRIMENTO;
            document.getElementById('peso').value = dino.peso || dino.PESO;
            document.getElementById('velocidade').value = dino.velocidade || dino.VELOCIDADE;
            document.getElementById('agilidade').value = dino.agilidade || dino.AGILIDADE;
            document.getElementById('longevidade').value = dino.longevidade || dino.LONGEVIDADE;
            document.getElementById('numero_magico').value = dino.numero_magico || dino.NUMERO_MAGICO;
            document.getElementById('imagem').value = dino.imagem || dino.IMAGEM || '';

            formTitle.innerText = "Editar Dinossauro";
            btnSubmit.innerText = "Atualizar Dinossauro";
            openModal();
        }

        // Deletar Dino
        async function deleteDino(id) {
            if (confirm("Tem certeza que deseja excluir este dinossauro?")) {
                try {
                    await fetch(`${API_URL}/del/${id}`, { method: 'DELETE' });
                    fetchDinos();
                } catch (error) {
                    console.error("Erro ao deletar dino:", error);
                    alert("Erro ao excluir o dinossauro.");
                }
            }
        }

        function resetForm() {
            dinoForm.reset();
            document.getElementById('dino-id').value = '';
            formTitle.innerText = "Adicionar Dinossauro";
            btnSubmit.innerText = "Salvar Dinossauro";
        }
    </script>
</body>
</html>
